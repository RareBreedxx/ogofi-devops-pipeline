apiVersion: apps/v1
kind: Deployment
metadata:
  name: ogofi-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ogofi-web
  template:
    metadata:
      labels:
        app: ogofi-web
    spec:
      containers:
      - name: web
        image: rarebreedxx/ogofi-web:latest
        ports:
        - containerPort: 80
